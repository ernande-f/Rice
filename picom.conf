backend = "glx";
blur-kern = "3x3box";
blur-method = "dual_kawase";
blur-strength = 2;

# Corners
corner-radius = 12;

rounded-corners-exclude = [
	"window_type = 'dock'",
	"window_type = 'desktop'",
	"class_g = 'dwm'",
	"class_g = 'dmenu'"
];

# Sombras
shadow = true;
shadow-radius = 12;
shadow-offset-x = -5;
shadow-offset-y = -5;
shadow-opacity = 0.5;

# Fade
fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;
fade-delta = 5;

# Animações
animations = true;
animation-stiffness = 300;
animation-dampening = 25;
animation-clamping = true;
animation-mass = 1;
animation-for-open-window = "zoom";
animation-for-unmap-window = "zoom";
animation-for-workspace-switch-in = "slide-left";
animation-for-workspace-switch-out = "slide-right";

# Transparência
active-opacity = 1.0;
inactive-opacity = 0.9;
frame-opacity = 0.9;
inactive-opacity-override = false;

# GLX
glx-no-stutter = true;
glx-no-rebind-pixmap = true;
use-damage = true;
